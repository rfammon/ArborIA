<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ArborIA - Sistema de Manejo Integrado Arbóreo</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00796b">
    <link rel="apple-touch-icon" href="img/icons/icon-192x192.png">
    <link rel="icon" type="image/png" href="img/icons/favicon.png">
    
    <link rel="stylesheet" href="style.css?v=78.1"> 
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header class="header-main" id="page-top"> 
        <div class="logo-container">
            <span class="arboria-text"><span class="blue">Arbor</span><span class="green">IA</span></span>
            <img src="img/icons/favicon.png" alt="Logo ArborIA" class="header-logo">
        </div>
        <p class="app-description">Sistema de Manejo Integrado Arbóreo</p>
    </header>

    <main>
        
        <div id="app-content">
            <section class="mapa-navegacao">
                <h2>Painel de Controle</h2>
                <nav class="topicos-container">
                    <button class="topico-btn active" data-target="conceitos-basicos">
                        <img src="img/icons/definicoes.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        Definições e Termos
                    </button>
                    
                    <button class="topico-btn" data-target="planejamento-inspecao">
                        <img src="img/icons/planejamento.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        Planejamento e Risco
                    </button>
                    
                    <button class="topico-btn" data-target="autorizacao-legal">
                        <img src="img/icons/legal.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        Termos Legais (ASV)
                    </button>
                    
                    <button class="topico-btn" data-target="preparacao-e-isolamento">
                        <img src="img/icons/preparacao.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        Preparação (Isolamento)
                    </button>
                    
                    <button class="topico-btn" data-target="operacoes-e-tecnicas">
                        <img src="img/icons/poda.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        Poda e Supressão
                    </button>
                    
                    <button class="topico-btn" data-target="riscos-e-epis">
                        <img src="img/icons/epi.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        EPIs e Análise de Risco
                    </button>
                    
                    <button class="topico-btn" data-target="gestao-e-desmobilizacao">
                        <img src="img/icons/residuos.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        Resíduos (MTR)
                    </button>
                    
                    <button class="topico-btn" data-target="glossario-geral">
                        <img src="img/icons/glossario.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        Glossário Geral
                    </button>
                    
                    <button class="topico-btn" data-target="sobre-autor">
                        <img src="img/icons/autor.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        Sobre o Autor
                    </button>
                    
                    <div class="nav-separator" style="height: 1px; background: #eee; margin: 5px 0;"></div>

                    <button class="topico-btn" data-target="calculadora-risco">
                        <img src="img/icons/calc.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        Calculadora de Risco
                    </button>
                    
                    <button class="topico-btn" data-target="clinometro-view">
                        <img src="img/icons/clinometro.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        Clinômetro (Altura)
                    </button>
                    
                    <button class="topico-btn" data-target="dap-estimator-view">
                        <img src="img/icons/dap.png" alt="" style="width: 24px; height: 24px; pointer-events: none; margin-right: 8px; vertical-align: middle;"> 
                        Medir DAP
                    </button> 
                </nav>
            </section>

            <section class="conteudo-detalhe" id="manual-view">
                <div id="detalhe-view">
                    </div>
            </section>

            <section class="app-view conteudo-detalhe" id="clinometro-view" style="display: none; padding: 0; overflow: hidden; background: #000;">
                <div id="camera-container">
                    <video id="camera-feed" autoplay playsinline muted></video>
                    <div class="crosshair"></div>
                    
                    <div class="hud-overlay">
                        <div class="hud-top">
                            <span id="clinometer-angle">0.0°</span>
                            <button type="button" id="close-clinometer" class="hud-close-btn">✖ Sair</button>
                        </div>
                        
                        <div class="hud-controls">
                            <div id="step-distance" class="hud-step active">
                                <label>Distância da Árvore (m):</label>
                                <input type="number" id="clino-distance" value="10" min="1" step="0.5">
                                <button id="btn-start-measure" class="hud-action-btn">Iniciar Medição</button>
                            </div>
                            <div id="step-base" class="hud-step">
                                <p>Mire na <strong>BASE</strong> da árvore</p>
                                <button id="btn-capture-base" class="hud-capture-btn">Capturar Base</button>
                            </div>
                            <div id="step-top" class="hud-step">
                                <p>Mire no <strong>TOPO</strong> da árvore</p>
                                <button id="btn-capture-top" class="hud-capture-btn">Capturar Topo</button>
                            </div>
                            <div id="step-result" class="hud-step">
                                <p>Altura Estimada:</p>
                                <h1 id="tree-height-result">0.0 m</h1>
                                <div class="result-actions">
                                    <button id="btn-reset-measure" class="hud-action-btn">Nova Medição</button>
                                    <button id="btn-save-height" class="hud-action-btn save">✅ Usar no Cadastro</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="app-view conteudo-detalhe" id="dap-estimator-view" style="display: none; padding: 0; overflow: hidden; background: #000;">
                <div id="dap-camera-container">
                    <video id="dap-camera-feed" autoplay playsinline muted></video>
                    <div class="crosshair"></div>
                    
                    <div class="hud-overlay">
                        <div class="hud-top">
                            <span id="dap-current-angle">0.0°</span> 
                            <button type="button" id="close-dap-estimator" class="hud-close-btn">✖ Sair</button>
                        </div>
                        
                        <div class="hud-controls">
                            <div id="dap-step-distance" class="hud-step active">
                                <p><strong>
